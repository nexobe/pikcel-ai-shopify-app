      - key: PIKCEL_API_KEY
        scope: RUN_TIME
        type: SECRET

      - key: PIKCEL_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET

    # Health check configuration
    health_check:
      http_path: /healthz
      initial_delay_seconds: 60
      period_seconds: 10
      timeout_seconds: 3
      success_threshold: 1
      failure_threshold: 3

    # Routes configuration
    routes:
      - path: /

# Jobs (for database migrations - uses PikcelAI Supabase database)
jobs:
  - name: db-migrate
    kind: PRE_DEPLOY

    github:
      repo: nexobe/pikcel-ai-shopify-app
      branch: main

    environment_slug: node-js

    run_command: npm run setup

    envs:
      - key: DATABASE_URL
        value: "postgresql://postgres.cvzkmmxdbkjhgfongupg:TughrulAsghar1986!@db.cvzkmmxdbkjhgfongupg.supabase.co:5432/postgres"
        scope: RUN_TIME
        type: SECRET

      - key: NODE_ENV
        value: production
        scope: RUN_TIME
        type: GENERAL

